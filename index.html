<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YEMDEEK — Verified Resale Marketplace</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #0C0C0E;
  --ink2: #141418;
  --ink3: #1C1C22;
  --ink4: #26262E;
  --border: rgba(212,185,120,0.18);
  --border2: rgba(255,255,255,0.07);
  --gold: #D4B978;
  --gold2: #E8D4A0;
  --gold3: #B8993A;
  --cream: #F5F0E8;
  --cream2: #EDE6D6;
  --text: #F0ECE4;
  --muted: #7A7468;
  --muted2: #9A9080;
  --green: #4A9E74;
  --red: #C85858;
  --blue: #4A78C8;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'DM Sans', sans-serif;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--ink);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── NOISE TEXTURE OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 999;
  opacity: 0.4;
}

/* ═══════════════════════════════════
   NAV
═══════════════════════════════════ */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 48px;
  height: 68px;
  background: rgba(12,12,14,0.92);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 600;
  letter-spacing: 3px;
  color: var(--gold);
  cursor: pointer;
}
.logo em { font-style: italic; color: var(--gold2); font-weight: 300; }

.nav-center {
  display: flex;
  gap: 4px;
  background: var(--ink3);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 5px;
}
.nav-tab {
  padding: 7px 22px;
  border-radius: 40px;
  border: none;
  cursor: pointer;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.5px;
  transition: all 0.3s;
  background: transparent;
  color: var(--muted2);
}
.nav-tab.active {
  background: var(--gold);
  color: var(--ink);
  font-weight: 600;
}

.nav-right { display: flex; align-items: center; gap: 12px; }
.nav-user {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--ink3);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 6px 16px 6px 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.nav-user:hover { border-color: var(--gold); }
.avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold3), var(--gold));
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; color: var(--ink);
}
.nav-name { font-size: 13px; font-weight: 500; }

/* ═══════════════════════════════════
   VIEWS
═══════════════════════════════════ */
.view { display: none; }
.view.active { display: block; animation: fadeUp 0.5s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

/* ═══════════════════════════════════
   AUTH MODAL
═══════════════════════════════════ */
.auth-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(12px);
  z-index: 500;
  align-items: center;
  justify-content: center;
}
.auth-overlay.open { display: flex; animation: fadeUp 0.3s ease; }

.auth-box {
  background: var(--ink2);
  border: 1px solid var(--border);
  border-radius: 24px;
  width: 420px;
  overflow: hidden;
  box-shadow: 0 40px 80px rgba(0,0,0,0.6);
}
.auth-header {
  padding: 32px 32px 0;
  text-align: center;
}
.auth-logo {
  font-family: var(--serif);
  font-size: 32px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 3px;
  margin-bottom: 8px;
}
.auth-subtitle { color: var(--muted2); font-size: 14px; margin-bottom: 28px; }

.auth-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.auth-tab {
  flex: 1;
  padding: 14px;
  text-align: center;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted2);
  font-family: var(--sans);
}
.auth-tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}

.auth-body { padding: 28px 32px 32px; }

.auth-role-select {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.role-btn {
  background: var(--ink3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.role-btn:hover, .role-btn.active {
  border-color: var(--gold);
  background: rgba(212,185,120,0.06);
}
.role-icon { font-size: 24px; margin-bottom: 6px; }
.role-label { font-size: 13px; font-weight: 500; }
.role-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }

.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: var(--muted2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.form-group input {
  width: 100%;
  background: var(--ink3);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus { border-color: var(--gold); }
.form-group input::placeholder { color: var(--muted); }

.auth-btn {
  width: 100%;
  background: var(--gold);
  color: var(--ink);
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-family: var(--sans);
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  margin-top: 6px;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.auth-btn:hover { background: var(--gold2); transform: translateY(-1px); }

.auth-divider { text-align: center; margin: 16px 0; color: var(--muted); font-size: 12px; position: relative; }
.auth-divider::before, .auth-divider::after { content: ''; position: absolute; top: 50%; width: 38%; height: 1px; background: var(--border); }
.auth-divider::before { left: 0; }
.auth-divider::after { right: 0; }

.trust-badges {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
.trust-item { text-align: center; }
.trust-icon { font-size: 18px; margin-bottom: 4px; }
.trust-text { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

/* ═══════════════════════════════════
   MARKETPLACE (BUYER VIEW)
═══════════════════════════════════ */
.hero {
  position: relative;
  padding: 80px 48px 64px;
  overflow: hidden;
  border-bottom: 1px solid var(--border);
}
.hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(212,185,120,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(212,185,120,0.04) 0%, transparent 50%),
    linear-gradient(180deg, var(--ink2) 0%, var(--ink) 100%);
}
.hero-lines {
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(
    90deg, transparent, transparent 79px,
    rgba(212,185,120,0.04) 79px, rgba(212,185,120,0.04) 80px
  );
}

.hero-content { position: relative; max-width: 680px; }
.hero-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(212,185,120,0.08);
  border: 1px solid rgba(212,185,120,0.25);
  border-radius: 40px;
  padding: 6px 16px;
  font-size: 12px;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 2px;
  font-weight: 500;
  margin-bottom: 24px;
}
.hero-tag::before { content: '●'; font-size: 8px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.hero h1 {
  font-family: var(--serif);
  font-size: 62px;
  font-weight: 500;
  line-height: 1.05;
  margin-bottom: 20px;
  letter-spacing: -0.5px;
}
.hero h1 em { font-style: italic; color: var(--gold); font-weight: 300; }

.hero p { color: var(--muted2); font-size: 16px; line-height: 1.6; max-width: 520px; margin-bottom: 36px; }

.hero-stats {
  display: flex;
  gap: 40px;
  margin-bottom: 40px;
}
.hero-stat-value {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 600;
  color: var(--gold);
}
.hero-stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

/* SEARCH */
.search-container {
  background: var(--ink2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 6px 6px 24px;
  display: flex;
  align-items: center;
  gap: 0;
  max-width: 760px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.search-field {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 10px 20px 10px 0;
  border-right: 1px solid var(--border);
}
.search-field:last-of-type { border: none; }
.sf-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
.sf-input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  width: 100%;
}
.sf-input::placeholder { color: var(--muted); }
.search-btn {
  background: var(--gold);
  color: var(--ink);
  border: none;
  border-radius: 14px;
  padding: 16px 32px;
  font-family: var(--sans);
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}
.search-btn:hover { background: var(--gold2); }

/* LISTINGS */
.listings-section { padding: 48px; }
.sec-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 32px;
}
.sec-title { font-family: var(--serif); font-size: 30px; font-weight: 500; }
.sec-count { color: var(--muted2); font-size: 13px; }

.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.filter-chip {
  background: var(--ink3);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 7px 18px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--muted2);
}
.filter-chip:hover, .filter-chip.active {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(212,185,120,0.05);
}

.listings-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 24px;
}

.listing-card {
  background: var(--ink2);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
  position: relative;
}
.listing-card:hover {
  border-color: rgba(212,185,120,0.4);
  transform: translateY(-6px);
  box-shadow: 0 24px 48px rgba(0,0,0,0.4), 0 0 0 1px rgba(212,185,120,0.1);
}

.card-img {
  height: 200px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 80px;
}
.card-img.h1 { background: linear-gradient(160deg, #0a1628 0%, #1a2d4a 50%, #0d1f38 100%); }
.card-img.h2 { background: linear-gradient(160deg, #1a0f05 0%, #2d1e0a 50%, #1a1205 100%); }
.card-img.h3 { background: linear-gradient(160deg, #050f1a 0%, #0a1f2d 50%, #05121a 100%); }
.card-img.h4 { background: linear-gradient(160deg, #12050a 0%, #240f18 50%, #120510 100%); }
.card-img.h5 { background: linear-gradient(160deg, #050f0a 0%, #0f2416 50%, #05120a 100%); }

.card-img::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 50%, rgba(12,12,14,0.8) 100%);
}

.verified-badge {
  position: absolute;
  top: 14px;
  right: 14px;
  background: rgba(74,158,116,0.2);
  border: 1px solid rgba(74,158,116,0.4);
  color: #6DBDA0;
  padding: 5px 12px;
  border-radius: 40px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  z-index: 1;
  display: flex;
  align-items: center;
  gap: 5px;
}
.verified-badge::before { content: '✓'; }

.urgency-badge {
  position: absolute;
  top: 14px;
  left: 14px;
  background: rgba(200,88,88,0.2);
  border: 1px solid rgba(200,88,88,0.4);
  color: #E07A7A;
  padding: 5px 12px;
  border-radius: 40px;
  font-size: 11px;
  font-weight: 600;
  z-index: 1;
}

.card-body { padding: 20px; }
.card-hotel { font-family: var(--serif); font-size: 20px; font-weight: 600; margin-bottom: 4px; line-height: 1.2; }
.card-location { color: var(--muted2); font-size: 13px; margin-bottom: 14px; display: flex; align-items: center; gap: 4px; }
.card-dates {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--ink3);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 14px;
  font-size: 13px;
  color: var(--muted2);
}
.date-arrow { color: var(--gold); }
.card-meta { display: flex; justify-content: space-between; align-items: center; }
.card-price-area {}
.original-price { font-size: 12px; color: var(--muted); text-decoration: line-through; }
.resale-price { font-family: var(--serif); font-size: 26px; font-weight: 600; color: var(--gold); line-height: 1; }
.per-night { font-size: 12px; color: var(--muted2); font-family: var(--sans); }
.savings-tag {
  background: rgba(74,158,116,0.12);
  border: 1px solid rgba(74,158,116,0.25);
  color: #6DBDA0;
  padding: 6px 14px;
  border-radius: 40px;
  font-size: 12px;
  font-weight: 600;
}

/* ═══════════════════════════════════
   PURCHASE MODAL
═══════════════════════════════════ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(16px);
  z-index: 400;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; animation: fadeUp 0.3s ease; }

.modal {
  background: var(--ink2);
  border: 1px solid var(--border);
  border-radius: 24px;
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-top {
  padding: 24px 28px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--ink2);
  z-index: 1;
}
.modal-title { font-family: var(--serif); font-size: 22px; font-weight: 500; }
.modal-close {
  width: 34px; height: 34px;
  background: var(--ink3);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text);
  font-size: 16px;
}

.modal-body { padding: 28px; }

.booking-summary {
  background: var(--ink3);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 24px;
  display: flex;
  gap: 16px;
  align-items: center;
}
.bs-icon { font-size: 40px; }
.bs-hotel { font-family: var(--serif); font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.bs-dates { font-size: 13px; color: var(--muted2); }

.payment-section { margin-bottom: 24px; }
.pay-title { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 14px; }

.card-input-group {
  background: var(--ink3);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 12px;
}
.card-input-row {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.card-input-row:last-child { border: none; }
.card-input-row input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  flex: 1;
}
.card-input-row input::placeholder { color: var(--muted); }
.card-icon { color: var(--muted); font-size: 18px; }

.card-row-split { display: grid; grid-template-columns: 1fr 1fr; }
.card-row-split .card-input-row:first-child { border-right: 1px solid var(--border); border-bottom: none; }

.price-breakdown {
  background: var(--ink3);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 20px;
}
.pb-row {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  color: var(--muted2);
  margin-bottom: 10px;
}
.pb-row.original .val { text-decoration: line-through; color: var(--muted); }
.pb-row.savings .val { color: var(--green); }
.pb-row.total {
  border-top: 1px solid var(--border);
  padding-top: 12px;
  margin-top: 4px;
  margin-bottom: 0;
  font-weight: 600;
  font-size: 16px;
  color: var(--text);
}
.pb-row.total .val { color: var(--gold); font-family: var(--serif); font-size: 20px; }
